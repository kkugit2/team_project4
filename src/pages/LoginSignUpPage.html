<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입 - 채용 정보 플랫폼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary-blue: #0052CC;
            --color-primary-green: #2ECC40;
            --color-primary-orange: #FF8C00;
            --color-light-gray: #F5F7FA;
            --color-medium-gray: #8A92A6;
            --color-dark-gray: #2C3E50;
            --color-white: #FFFFFF;
            --color-error: #DC3545;
            --color-info: #17A2B8;

            --font-size-h1: 32px;
            --font-size-h2: 24px;
            --font-size-h3: 18px;
            --font-size-body-large: 16px;
            --font-size-body: 14px;
            --font-size-small: 12px;
            --font-size-caption: 11px;

            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;

            --breakpoint-mobile: 480px;
            --breakpoint-tablet: 1024px;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: var(--color-white);
            color: var(--color-dark-gray);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* 공통 스타일 */
        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }

        .auth-header .logo {
            font-size: var(--font-size-h3);
            font-weight: 600;
            color: var(--color-primary-blue);
            margin-bottom: var(--spacing-lg);
        }

        .auth-header h1 {
            font-size: var(--font-size-h1);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: var(--color-dark-gray);
        }

        .auth-header p {
            font-size: var(--font-size-body);
            color: var(--color-medium-gray);
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            font-size: var(--font-size-h3);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-dark-gray);
        }

        label .required {
            color: var(--color-error);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select {
            width: 100%;
            height: 44px;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-size-body);
            border: 1px solid var(--color-medium-gray);
            border-radius: 8px;
            background-color: var(--color-white);
            color: var(--color-dark-gray);
            transition: all 200ms ease-out;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border: 2px solid var(--color-primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 82, 204, 0.1);
        }

        input[type="text"].error,
        input[type="email"].error,
        input[type="password"].error {
            border: 2px solid var(--color-error);
            background-color: #FEF5F5;
        }

        input[type="text"].success,
        input[type="email"].success,
        input[type="password"].success {
            border: 2px solid var(--color-primary-green);
        }

        input::placeholder {
            color: var(--color-medium-gray);
        }

        .error-message {
            font-size: var(--font-size-small);
            color: var(--color-error);
            margin-top: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            role: alert;
        }

        .helper-text {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            margin-top: var(--spacing-xs);
        }

        .password-checklist {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            margin-top: var(--spacing-sm);
        }

        .password-checklist-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin: var(--spacing-xs) 0;
        }

        .password-checklist-item.checked {
            color: var(--color-primary-green);
        }

        .password-checklist-item.checked .icon {
            color: var(--color-primary-green);
        }

        /* 버튼 스타일 */
        .button-group {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        button {
            font-size: var(--font-size-body);
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 200ms ease-out;
            height: 48px;
        }

        button.primary {
            width: 100%;
            height: 48px;
            background-color: var(--color-primary-blue);
            color: var(--color-white);
            padding: var(--spacing-sm) var(--spacing-md);
        }

        button.primary:hover:not(:disabled) {
            background-color: #003DA8;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
            transform: translateY(-1px);
        }

        button.primary:focus {
            outline: 2px solid var(--color-primary-blue);
            outline-offset: 2px;
        }

        button.primary:disabled {
            background-color: #C5CCD4;
            color: var(--color-medium-gray);
            cursor: not-allowed;
        }

        button.secondary {
            flex: 1;
            background-color: var(--color-light-gray);
            color: var(--color-primary-blue);
            border: 1px solid var(--color-medium-gray);
            height: 40px;
        }

        button.secondary:hover {
            background-color: #E8ECEF;
            border-color: var(--color-primary-blue);
        }

        .text-link {
            background: none;
            border: none;
            color: var(--color-primary-blue);
            text-decoration: underline;
            font-size: var(--font-size-body);
            height: auto;
            padding: 0;
            cursor: pointer;
            margin-top: var(--spacing-sm);
        }

        .text-link:hover {
            color: #003DA8;
        }

        /* 로그인 / 회원가입 탭 */
        .auth-tabs {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid #E8ECEF;
        }

        .auth-tab {
            flex: 1;
            padding: var(--spacing-md);
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--color-medium-gray);
            font-size: var(--font-size-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease-out;
        }

        .auth-tab.active {
            border-bottom-color: var(--color-primary-blue);
            color: var(--color-primary-blue);
        }

        /* Step 표시 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--color-light-gray);
            border-radius: 4px;
            margin-bottom: var(--spacing-md);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--color-primary-blue);
            transition: width 200ms ease-out;
            border-radius: 4px;
        }

        .step-counter {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            text-align: right;
            margin-bottom: var(--spacing-md);
        }

        /* 사용자 타입 선택 */
        .user-type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
        }

        .user-type-card {
            padding: var(--spacing-lg);
            border: 2px solid var(--color-medium-gray);
            border-radius: 12px;
            background-color: var(--color-white);
            cursor: pointer;
            transition: all 200ms ease-out;
            text-align: center;
        }

        .user-type-card:hover {
            border-color: var(--color-primary-blue);
            background-color: var(--color-light-gray);
        }

        .user-type-card.selected {
            border-color: var(--color-primary-blue);
            background-color: var(--color-light-gray);
            border-left: 4px solid var(--color-primary-blue);
        }

        .user-type-card .icon {
            font-size: var(--font-size-h1);
            margin-bottom: var(--spacing-sm);
        }

        .user-type-card h3 {
            font-size: var(--font-size-h3);
            margin-bottom: var(--spacing-sm);
            color: var(--color-dark-gray);
        }

        .user-type-card p {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            line-height: 1.4;
        }

        /* 페이지별 스타일 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .divider {
            text-align: center;
            margin: var(--spacing-lg) 0;
            color: var(--color-medium-gray);
            font-size: var(--font-size-small);
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
        }

        .social-button {
            width: 100%;
            height: 40px;
            background-color: var(--color-light-gray);
            color: var(--color-primary-blue);
            border: 1px solid var(--color-medium-gray);
            border-radius: 8px;
            cursor: pointer;
            font-size: var(--font-size-body);
            transition: all 200ms ease-out;
        }

        .social-button:hover {
            background-color: #E8ECEF;
        }

        .signup-link {
            text-align: center;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid #E8ECEF;
        }

        .signup-link p {
            font-size: var(--font-size-body);
            color: var(--color-dark-gray);
            margin-bottom: var(--spacing-sm);
        }

        /* 기술 스택 태그 입력 */
        .tag-input-container {
            border: 1px solid var(--color-medium-gray);
            border-radius: 8px;
            padding: var(--spacing-sm);
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            align-items: center;
            background-color: var(--color-white);
            min-height: 44px;
        }

        .tag {
            background-color: var(--color-light-gray);
            color: var(--color-dark-gray);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: 4px;
            font-size: var(--font-size-small);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .tag-close {
            cursor: pointer;
            font-weight: bold;
            color: var(--color-medium-gray);
        }

        .tag-input-container input {
            flex: 1;
            border: none;
            outline: none;
            min-width: 100px;
            height: auto;
            padding: var(--spacing-xs) 0;
            font-size: var(--font-size-body);
        }

        /* 반응형 */
        @media (max-width: 479px) {
            body {
                padding: var(--spacing-md);
            }

            .user-type-selector {
                grid-template-columns: 1fr;
            }

            button {
                height: 48px;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: var(--spacing-2xl);
            }

            .container {
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 로그인 페이지 -->
        <div id="loginPage" class="page active">
            <div class="auth-header">
                <div class="logo">채용 플랫폼</div>
                <h1>로그인</h1>
                <p>계정으로 로그인하세요</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">이메일/아이디 <span class="required">*</span></label>
                    <input type="email" id="loginEmail" placeholder="이메일을 입력하세요" required>
                    <div id="loginEmailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">비밀번호 <span class="required">*</span></label>
                    <div style="position: relative;">
                        <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" required>
                        <button type="button" class="eye-toggle" onclick="togglePasswordVisibility('loginPassword')" style="position: absolute; right: 12px; top: 8px; background: none; border: none; padding: 0; cursor: pointer; color: var(--color-primary-blue); width: 28px; height: 28px;">👁</button>
                    </div>
                </div>

                <button type="button" class="text-link" onclick="alert('비밀번호 찾기 기능은 준비 중입니다.')">비밀번호 찾기</button>

                <button type="submit" class="primary" style="margin-top: var(--spacing-lg);">로그인 하기</button>

                <div class="divider">또는</div>

                <div class="social-buttons">
                    <button type="button" class="social-button" onclick="alert('구글 로그인은 준비 중입니다.')">🔗 구글로 로그인</button>
                    <button type="button" class="social-button" onclick="alert('깃허브 로그인은 준비 중입니다.')">🔗 깃허브로 로그인</button>
                </div>

                <div class="signup-link">
                    <p>계정이 없으신가요?</p>
                    <button type="button" class="text-link" onclick="switchToSignup()">회원가입 하기</button>
                </div>
            </form>
        </div>

        <!-- 회원가입 페이지 -->
        <div id="signupPage" class="page">
            <div class="auth-header" style="position: relative;">
                <button type="button" onclick="switchToLogin()" style="position: absolute; left: 0; top: -8px; background: none; border: none; font-size: 20px; cursor: pointer;">← 뒤로</button>
                <h1 style="margin: 0;">회원가입</h1>
                <button type="button" onclick="switchToLogin()" style="position: absolute; right: 0; top: -8px; background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
            </div>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 33.33%;"></div>
            </div>
            <div class="step-counter"><span id="stepCounter">1</span>/3</div>

            <!-- Step 1: 사용자 타입 선택 -->
            <div id="step1" class="form-section active">
                <h2 style="font-size: var(--font-size-h2); margin-bottom: var(--spacing-lg);">당신은 누구신가요?</h2>
                <p style="font-size: var(--font-size-small); color: var(--color-medium-gray); margin-bottom: var(--spacing-lg);">다음 단계를 진행하기 위해 선택하세요</p>

                <div class="user-type-selector">
                    <div class="user-type-card" onclick="selectUserType('seeker', this)">
                        <div class="icon">👤</div>
                        <h3>구직자</h3>
                        <p>채용공고 탐색 및<br>자소서 분석</p>
                    </div>
                    <div class="user-type-card" onclick="selectUserType('recruiter', this)">
                        <div class="icon">🏢</div>
                        <h3>기업 인사팀</h3>
                        <p>인재상 등록 및<br>인재 발굴</p>
                    </div>
                </div>

                <div class="button-group" style="flex-direction: column; gap: 0;">
                    <button type="button" class="primary" id="step1NextBtn" onclick="moveToStep(2)" disabled>다음 단계</button>
                </div>
            </div>

            <!-- Step 2: 계정 정보 -->
            <div id="step2" class="form-section" style="display: none;">
                <h2 style="font-size: var(--font-size-h2); margin-bottom: var(--spacing-lg);">계정 정보</h2>

                <div class="form-group">
                    <label for="signupEmail">이메일 <span class="required">*</span></label>
                    <input type="email" id="signupEmail" placeholder="이메일을 입력하세요" required>
                    <div id="signupEmailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">비밀번호 <span class="required">*</span></label>
                    <div style="position: relative;">
                        <input type="password" id="signupPassword" placeholder="비밀번호를 입력하세요" required oninput="validatePassword(this.value)">
                        <button type="button" class="eye-toggle" onclick="togglePasswordVisibility('signupPassword')" style="position: absolute; right: 12px; top: 8px; background: none; border: none; padding: 0; cursor: pointer; color: var(--color-primary-blue); width: 28px; height: 28px;">👁</button>
                    </div>
                    <div class="password-checklist">
                        <div id="check1" class="password-checklist-item"><span class="icon">○</span> 8자 이상</div>
                        <div id="check2" class="password-checklist-item"><span class="icon">○</span> 대문자, 소문자, 숫자 포함</div>
                        <div id="check3" class="password-checklist-item"><span class="icon">○</span> 특수 문자 (!@#$%^&*) 포함</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPasswordConfirm">비밀번호 확인 <span class="required">*</span></label>
                    <div style="position: relative;">
                        <input type="password" id="signupPasswordConfirm" placeholder="비밀번호를 다시 입력하세요" required oninput="validatePasswordMatch()">
                        <button type="button" class="eye-toggle" onclick="togglePasswordVisibility('signupPasswordConfirm')" style="position: absolute; right: 12px; top: 8px; background: none; border: none; padding: 0; cursor: pointer; color: var(--color-primary-blue); width: 28px; height: 28px;">👁</button>
                    </div>
                    <div id="passwordMatchError" class="error-message"></div>
                </div>

                <div class="button-group">
                    <button type="button" class="secondary" onclick="moveToStep(1)">이전 단계</button>
                    <button type="button" class="primary" id="step2NextBtn" onclick="moveToStep(3)" disabled>다음 단계</button>
                </div>
            </div>

            <!-- Step 3: 구직자 추가 정보 (선택사항) -->
            <div id="step3" class="form-section" style="display: none;">
                <h2 style="font-size: var(--font-size-h2); margin-bottom: var(--spacing-lg);">경력 정보 입력 (선택사항)</h2>
                <p style="font-size: var(--font-size-small); color: var(--color-medium-gray); margin-bottom: var(--spacing-lg);">나중에 마이페이지에서도 입력 및 수정할 수 있습니다</p>

                <div id="step3Content" style="display: none;">
                    <div class="form-group">
                        <label for="education">학적 <span class="required">*</span></label>
                        <select id="education">
                            <option value="">선택하세요</option>
                            <option value="high_school">고등학교</option>
                            <option value="bachelor">대학교</option>
                            <option value="master">대학원</option>
                            <option value="associate">전문대</option>
                            <option value="none">해당사항 없음</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="gpa">학점 <span class="required">*</span></label>
                        <select id="gpa">
                            <option value="">선택하세요</option>
                            <option value="4.5">4.5 / 4.5</option>
                            <option value="4.4">4.4 / 4.5</option>
                            <option value="4.3">4.3 / 4.5</option>
                            <option value="4.0">4.0 / 4.5</option>
                            <option value="3.8">3.8 / 4.5</option>
                            <option value="3.5">3.5 / 4.5</option>
                            <option value="3.2">3.2 / 4.5</option>
                            <option value="3.0">3.0 / 4.5</option>
                            <option value="none">해당사항 없음</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="skills">기술 스택 <span class="required">*</span></label>
                        <div class="tag-input-container" onclick="document.getElementById('skillInput').focus();">
                            <input type="text" id="skillInput" placeholder="기술 입력 후 Enter" onkeypress="addSkill(event)">
                        </div>
                        <div id="skillTags"></div>
                    </div>

                    <div class="form-group">
                        <label>경력 <span class="required">*</span></label>
                        <div style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                            <label style="display: flex; align-items: center; font-size: var(--font-size-body); font-weight: normal;">
                                <input type="radio" name="experience" value="entry" style="margin-right: var(--spacing-md);"> 신입 (경력 0년)
                            </label>
                            <label style="display: flex; align-items: center; font-size: var(--font-size-body); font-weight: normal;">
                                <input type="radio" name="experience" value="internship" style="margin-right: var(--spacing-md);"> 인턴십 경험 있음
                            </label>
                            <label style="display: flex; align-items: center; font-size: var(--font-size-body); font-weight: normal;">
                                <input type="radio" name="experience" value="experienced" style="margin-right: var(--spacing-md);"> 1년 이상 경력
                            </label>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="secondary" onclick="moveToStep(2)">이전 단계</button>
                    <button type="button" class="primary" onclick="completeSignup()">회원가입 완료</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedUserType = null;
        let selectedSkills = [];

        // 페이지 전환
        function switchToLogin() {
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('signupPage').classList.remove('active');
        }

        function switchToSignup() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('signupPage').classList.add('active');
        }

        // 사용자 타입 선택
        function selectUserType(type, element) {
            selectedUserType = type;
            document.querySelectorAll('.user-type-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('step1NextBtn').disabled = false;
        }

        // Step 이동
        function moveToStep(step) {
            // 현재 step의 폼 검증
            if (step === 2 && !validateStep1()) {
                return;
            }
            if (step === 3 && !validateStep2()) {
                return;
            }

            // Step 표시 업데이트
            document.querySelectorAll('.form-section').forEach(section => {
                section.style.display = 'none';
                section.classList.remove('active');
            });
            document.getElementById(`step${step}`).style.display = 'block';
            document.getElementById(`step${step}`).classList.add('active');

            // Progress bar 업데이트
            const progressPercentage = (step / 3) * 100;
            document.getElementById('progressFill').style.width = progressPercentage + '%';
            document.getElementById('stepCounter').textContent = step;

            // Step 3에서 구직자인 경우만 폼 표시
            if (step === 3 && selectedUserType === 'seeker') {
                document.getElementById('step3Content').style.display = 'block';
            }
        }

        // 단계별 검증
        function validateStep1() {
            if (!selectedUserType) {
                alert('사용자 타입을 선택하세요');
                return false;
            }
            return true;
        }

        function validateStep2() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

            // 이메일 검증
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('signupEmailError').textContent = '유효한 이메일을 입력하세요';
                return false;
            }

            // 비밀번호 검증
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[a-zA-Z\d!@#$%^&*]{8,}$/;
            if (!passwordRegex.test(password)) {
                alert('비밀번호는 8자 이상이며, 대문자, 소문자, 숫자, 특수 문자를 포함해야 합니다');
                return false;
            }

            // 비밀번호 일치 확인
            if (password !== passwordConfirm) {
                document.getElementById('passwordMatchError').textContent = '비밀번호가 일치하지 않습니다';
                return false;
            }

            return true;
        }

        // 비밀번호 유효성 검증
        function validatePassword(password) {
            const checks = [
                { id: 'check1', regex: /.{8,}/, text: '8자 이상' },
                { id: 'check2', regex: /(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/, text: '대문자, 소문자, 숫자 포함' },
                { id: 'check3', regex: /[!@#$%^&*]/, text: '특수 문자 (!@#$%^&*) 포함' }
            ];

            checks.forEach(check => {
                const element = document.getElementById(check.id);
                if (check.regex.test(password)) {
                    element.classList.add('checked');
                    element.querySelector('.icon').textContent = '✓';
                } else {
                    element.classList.remove('checked');
                    element.querySelector('.icon').textContent = '○';
                }
            });
        }

        // 비밀번호 일치 확인
        function validatePasswordMatch() {
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;

            if (password && passwordConfirm && password === passwordConfirm) {
                document.getElementById('passwordMatchError').textContent = '';
                document.getElementById('step2NextBtn').disabled = false;
            } else if (passwordConfirm && password !== passwordConfirm) {
                document.getElementById('passwordMatchError').textContent = '비밀번호가 일치하지 않습니다';
                document.getElementById('step2NextBtn').disabled = true;
            }
        }

        // 비밀번호 보이기/숨기기
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // 기술 스택 태그 추가
        function addSkill(event) {
            if (event.key !== 'Enter') return;
            event.preventDefault();

            const skillInput = document.getElementById('skillInput');
            const skill = skillInput.value.trim();

            if (skill && !selectedSkills.includes(skill)) {
                selectedSkills.push(skill);
                renderSkillTags();
                skillInput.value = '';
            }
        }

        function renderSkillTags() {
            const container = document.getElementById('skillTags');
            container.innerHTML = '';
            selectedSkills.forEach(skill => {
                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.innerHTML = `${skill}<span class="tag-close" onclick="removeSkill('${skill}')">×</span>`;
                container.appendChild(tag);
            });
        }

        function removeSkill(skill) {
            selectedSkills = selectedSkills.filter(s => s !== skill);
            renderSkillTags();
        }

        // 회원가입 완료
        function completeSignup() {
            const signupData = {
                userType: selectedUserType,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value,
                education: document.getElementById('education')?.value || null,
                gpa: document.getElementById('gpa')?.value || null,
                skills: selectedSkills,
                experience: document.querySelector('input[name="experience"]:checked')?.value || null
            };

            // 로컬 스토리지에 저장
            localStorage.setItem('userSignup', JSON.stringify(signupData));
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', signupData.email);

            alert('회원가입이 완료되었습니다!');
            switchToLogin();

            // 폼 초기화
            document.getElementById('loginForm').reset();
        }

        // 로그인 처리
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // 간단한 로그인 검증 (실제로는 서버에서 처리)
            const signupData = JSON.parse(localStorage.getItem('userSignup')) || {};

            if (email === signupData.email && password === signupData.password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                alert('로그인 성공! 마이페이지로 이동합니다.');
                window.location.href = 'SeekerMyPage.html';
            } else {
                document.getElementById('loginEmailError').textContent = '이메일 또는 비밀번호가 올바르지 않습니다';
            }
        });

        // 초기화
        document.getElementById('signupEmail').addEventListener('input', function() {
            document.getElementById('signupEmailError').textContent = '';
        });
    </script>
</body>
</html>
