<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 구직자</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary-blue: #0052CC;
            --color-primary-green: #2ECC40;
            --color-primary-orange: #FF8C00;
            --color-light-gray: #F5F7FA;
            --color-medium-gray: #8A92A6;
            --color-dark-gray: #2C3E50;
            --color-white: #FFFFFF;
            --color-error: #DC3545;

            --font-size-h1: 32px;
            --font-size-h2: 24px;
            --font-size-h3: 18px;
            --font-size-body: 14px;
            --font-size-small: 12px;

            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: var(--color-light-gray);
            color: var(--color-dark-gray);
        }

        header {
            background-color: var(--color-white);
            border-bottom: 1px solid #E8ECEF;
            padding: var(--spacing-md) var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .header-left button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .header-left h1 {
            font-size: var(--font-size-h2);
            font-weight: 700;
        }

        .header-right button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        /* 카드 스타일 */
        .card {
            background-color: var(--color-white);
            border: 1px solid #E8ECEF;
            border-radius: 12px;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            transition: all 200ms ease-out;
        }

        .card:hover {
            border-color: var(--color-primary-blue);
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.12);
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: var(--font-size-h2);
            margin-bottom: var(--spacing-lg);
            color: var(--color-dark-gray);
        }

        .card h3 {
            font-size: var(--font-size-h3);
            margin-bottom: var(--spacing-sm);
            color: var(--color-dark-gray);
        }

        /* 프로필 헤더 */
        .profile-card {
            text-align: center;
            padding: var(--spacing-2xl) var(--spacing-lg);
            background: linear-gradient(135deg, #F5F7FA 0%, #FFFFFF 100%);
        }

        .profile-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #DDD;
            margin: 0 auto var(--spacing-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .profile-card h1 {
            font-size: var(--font-size-h2);
            margin-bottom: var(--spacing-sm);
        }

        .profile-card p {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            margin-bottom: var(--spacing-lg);
        }

        .profile-card .text-link {
            color: var(--color-primary-blue);
            text-decoration: underline;
            cursor: pointer;
            font-size: var(--font-size-body);
        }

        /* 섹션 */
        .section-header {
            font-size: var(--font-size-h2);
            font-weight: 700;
            margin: var(--spacing-xl) 0 var(--spacing-lg) 0;
            color: var(--color-dark-gray);
        }

        /* 기본정보 카드 */
        .info-card {
            background-color: var(--color-white);
            border: 1px solid #E8ECEF;
            border-radius: 12px;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .info-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .info-card-title {
            font-size: var(--font-size-h3);
            font-weight: 600;
        }

        .edit-btn {
            color: var(--color-primary-blue);
            text-decoration: underline;
            cursor: pointer;
            font-size: var(--font-size-body);
            background: none;
            border: none;
        }

        .info-card-content {
            font-size: var(--font-size-body);
            color: var(--color-dark-gray);
            line-height: 1.6;
        }

        .info-card-meta {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            font-size: var(--font-size-h3);
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-dark-gray);
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-size-body);
            border: 1px solid var(--color-medium-gray);
            border-radius: 8px;
            font-family: inherit;
            transition: all 200ms ease-out;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border: 2px solid var(--color-primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 82, 204, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* 버튼 */
        button {
            padding: var(--spacing-sm) var(--spacing-lg);
            font-size: var(--font-size-body);
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 200ms ease-out;
        }

        button.primary {
            background-color: var(--color-primary-blue);
            color: var(--color-white);
            height: 48px;
            width: 100%;
        }

        button.primary:hover {
            background-color: #003DA8;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
            transform: translateY(-1px);
        }

        button.secondary {
            background-color: var(--color-light-gray);
            color: var(--color-primary-blue);
            border: 1px solid var(--color-medium-gray);
            height: 40px;
        }

        button.secondary:hover {
            background-color: #E8ECEF;
        }

        button.danger {
            background-color: var(--color-error);
            color: var(--color-white);
            height: 40px;
        }

        button.danger:hover {
            background-color: #C82333;
        }

        .button-group {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        /* 리스트 항목 */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .item-card {
            background-color: var(--color-white);
            border: 1px solid #E8ECEF;
            border-radius: 12px;
            padding: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 200ms ease-out;
        }

        .item-card:hover {
            border-color: var(--color-primary-blue);
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.12);
            transform: translateY(-2px);
        }

        .item-content h4 {
            font-size: var(--font-size-h3);
            margin-bottom: var(--spacing-sm);
        }

        .item-content p {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            margin-bottom: var(--spacing-xs);
        }

        .item-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .item-actions button {
            padding: var(--spacing-xs) var(--spacing-md);
            font-size: var(--font-size-small);
            height: auto;
            width: auto;
        }

        /* Add 버튼 */
        .add-btn {
            color: var(--color-primary-blue);
            text-decoration: underline;
            cursor: pointer;
            font-size: var(--font-size-body);
            background: none;
            border: none;
            padding: 0;
            margin-top: var(--spacing-md);
        }

        /* 탭 */
        .tabs {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid #E8ECEF;
        }

        .tab {
            flex: 1;
            padding: var(--spacing-md);
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--color-medium-gray);
            font-size: var(--font-size-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease-out;
        }

        .tab.active {
            border-bottom-color: var(--color-primary-blue);
            color: var(--color-primary-blue);
        }

        /* 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--color-white);
            border-radius: 12px;
            padding: var(--spacing-2xl);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 64px rgba(0, 0, 0, 0.15);
            animation: slideUp 200ms ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid #E8ECEF;
            padding-bottom: var(--spacing-lg);
        }

        .modal-header h2 {
            font-size: var(--font-size-h2);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--color-medium-gray);
            padding: 0;
            width: 32px;
            height: 32px;
        }

        /* 스카웃 카드 */
        .scout-card {
            background-color: var(--color-white);
            border: 1px solid #E8ECEF;
            border-radius: 12px;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .scout-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-md);
        }

        .scout-company {
            font-size: var(--font-size-h3);
            font-weight: 600;
        }

        .scout-position {
            font-size: var(--font-size-body);
            color: var(--color-medium-gray);
        }

        .scout-badge {
            background-color: var(--color-primary-orange);
            color: var(--color-white);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: 6px;
            font-size: var(--font-size-caption);
            font-weight: 500;
        }

        .scout-message {
            font-size: var(--font-size-body);
            color: var(--color-dark-gray);
            margin: var(--spacing-md) 0;
            line-height: 1.6;
        }

        .scout-meta {
            font-size: var(--font-size-small);
            color: var(--color-medium-gray);
            margin: var(--spacing-md) 0;
        }

        .scout-actions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .scout-actions button {
            flex: 1;
            height: 48px;
        }

        /* 하단 액션 */
        .footer-actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid #E8ECEF;
        }

        .footer-actions button {
            height: auto;
            padding: var(--spacing-md) var(--spacing-lg);
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl);
            background-color: var(--color-light-gray);
            border-radius: 12px;
            margin-bottom: var(--spacing-lg);
        }

        .empty-state p {
            font-size: var(--font-size-body);
            color: var(--color-medium-gray);
        }

        /* 반응형 */
        @media (max-width: 479px) {
            .container {
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .button-group {
                flex-direction: column;
            }

            .item-card {
                flex-direction: column;
            }

            .scout-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header>
        <div class="header-left">
            <button onclick="goBack()">←</button>
            <h1>마이페이지</h1>
        </div>
        <div class="header-right">
            <button onclick="openSettings()">⚙</button>
        </div>
    </header>

    <div class="container">
        <!-- 프로필 헤더 -->
        <div class="card profile-card">
            <div class="profile-image">👤</div>
            <h1 id="profileName">사용자</h1>
            <p id="profileEmail">user@example.com</p>
            <button class="text-link" onclick="editProfile()">프로필 편집</button>
        </div>

        <!-- 기본 정보 -->
        <h2 class="section-header">기본 정보</h2>

        <!-- 학적 -->
        <div class="info-card" id="educationCard">
            <div class="info-card-header">
                <div class="info-card-title">학적</div>
                <button class="edit-btn" onclick="editEducation()">수정</button>
            </div>
            <div class="info-card-content" id="educationContent">정보가 없습니다</div>
        </div>

        <!-- 학점 -->
        <div class="info-card" id="gpaCard">
            <div class="info-card-header">
                <div class="info-card-title">학점</div>
                <button class="edit-btn" onclick="editGPA()">수정</button>
            </div>
            <div class="info-card-content" id="gpaContent">정보가 없습니다</div>
        </div>

        <!-- 자격증 -->
        <h2 class="section-header">자격증</h2>
        <div id="certificateList" class="item-list"></div>
        <button class="add-btn" onclick="openCertificateModal()">+ 자격증 추가</button>

        <!-- 경력 -->
        <h2 class="section-header">경력</h2>
        <div id="experienceList" class="item-list"></div>
        <button class="add-btn" onclick="openExperienceModal()">+ 경력 추가</button>

        <!-- 스카웃 -->
        <h2 class="section-header">스카웃</h2>
        <div class="tabs">
            <button class="tab active" onclick="switchScoutTab('received', this)">받은 스카웃: <span id="scoutCount">0</span>개</button>
            <button class="tab" onclick="switchScoutTab('rejected', this)">거절한 스카웃</button>
            <button class="tab" onclick="switchScoutTab('accepted', this)">수락한 스카웃</button>
        </div>
        <div id="scoutList" class="item-list"></div>

        <!-- 하단 액션 -->
        <div class="footer-actions">
            <button class="secondary" onclick="logout()">로그아웃</button>
            <button class="text-link" style="color: var(--color-error);" onclick="deleteAccount()">계정 삭제</button>
        </div>
    </div>

    <!-- 자격증 모달 -->
    <div id="certificateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="certTitle">자격증 추가</h2>
                <button class="modal-close" onclick="closeCertificateModal()">×</button>
            </div>
            <form id="certificateForm" onsubmit="saveCertificate(event)">
                <div class="form-group">
                    <label for="certName">자격증명 <span style="color: var(--color-error);">*</span></label>
                    <input type="text" id="certName" required>
                </div>
                <div class="form-group">
                    <label for="certIssued">취득 일자 <span style="color: var(--color-error);">*</span></label>
                    <input type="date" id="certIssued" required>
                </div>
                <div class="form-group">
                    <label for="certExpires">만료 일자</label>
                    <input type="date" id="certExpires">
                </div>
                <div class="form-group">
                    <label for="certIssuer">발급 기관</label>
                    <input type="text" id="certIssuer">
                </div>
                <div class="button-group">
                    <button type="button" class="secondary" onclick="closeCertificateModal()" style="flex: 1;">취소</button>
                    <button type="submit" class="primary" style="flex: 1;">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 경력 모달 -->
    <div id="experienceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="expTitle">경력 추가</h2>
                <button class="modal-close" onclick="closeExperienceModal()">×</button>
            </div>
            <form id="experienceForm" onsubmit="saveExperience(event)">
                <div class="form-group">
                    <label for="expCompany">회사명 <span style="color: var(--color-error);">*</span></label>
                    <input type="text" id="expCompany" required>
                </div>
                <div class="form-group">
                    <label for="expPosition">직급/직무 <span style="color: var(--color-error);">*</span></label>
                    <input type="text" id="expPosition" required>
                </div>
                <div class="form-group">
                    <label for="expStart">근무 시작일 <span style="color: var(--color-error);">*</span></label>
                    <input type="date" id="expStart" required>
                </div>
                <div class="form-group">
                    <label for="expEnd">근무 종료일</label>
                    <input type="date" id="expEnd">
                    <label style="margin-top: var(--spacing-sm);">
                        <input type="checkbox" id="isCurrent"> 현직
                    </label>
                </div>
                <div class="form-group">
                    <label for="expDescription">업무 설명</label>
                    <textarea id="expDescription"></textarea>
                </div>
                <div class="button-group">
                    <button type="button" class="secondary" onclick="closeExperienceModal()" style="flex: 1;">취소</button>
                    <button type="submit" class="primary" style="flex: 1;">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 더미 데이터
        let userData = {
            name: '김지은',
            email: 'ji.kim@example.com',
            education: '서울대학교 컴퓨터공학과 (2023년 졸업)',
            gpa: '3.8 / 4.5',
            certificates: [
                { id: 1, name: 'AWS Certified Solutions Architect', issued: '2024-03-15', expires: '2026-03-15', issuer: 'AWS' }
            ],
            experiences: [
                { id: 1, company: '테크스타트업 A', position: 'Senior Backend Engineer', start: '2021-06-01', end: '2026-07-15', isCurrent: false, description: 'REST API 개발, 시스템 아키텍처 설계' }
            ],
            scouts: {
                received: [
                    { id: 1, company: '테크스타트업 B', position: 'Backend Engineer', message: '당신의 기술 스택과 경력이 우리 팀에 잘 맞을 것 같습니다.', salary: '연봉 협의', expiresDays: 3, status: 'pending' }
                ],
                rejected: [],
                accepted: []
            }
        };

        let editingId = null;

        // 초기화
        function init() {
            const signupData = JSON.parse(localStorage.getItem('userSignup'));
            if (signupData) {
                userData.name = signupData.email.split('@')[0];
                userData.email = signupData.email;
            }

            renderProfile();
            renderEducation();
            renderGPA();
            renderCertificates();
            renderExperiences();
            renderScouts();
        }

        // 프로필 표시
        function renderProfile() {
            document.getElementById('profileName').textContent = userData.name;
            document.getElementById('profileEmail').textContent = userData.email;
        }

        // 학적 표시
        function renderEducation() {
            const content = document.getElementById('educationContent');
            if (userData.education) {
                content.innerHTML = userData.education;
            }
        }

        // 학점 표시
        function renderGPA() {
            const content = document.getElementById('gpaContent');
            if (userData.gpa) {
                content.innerHTML = userData.gpa;
            }
        }

        // 자격증 표시
        function renderCertificates() {
            const list = document.getElementById('certificateList');
            list.innerHTML = '';

            if (userData.certificates.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>아직 등록한 자격증이 없습니다</p></div>';
                return;
            }

            userData.certificates.forEach(cert => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-content">
                        <h4>${cert.name}</h4>
                        <p>${cert.issued} 취득</p>
                        ${cert.expires ? `<p>${cert.expires} 만료</p>` : ''}
                        ${cert.issuer ? `<p>${cert.issuer}</p>` : ''}
                    </div>
                    <div class="item-actions">
                        <button class="secondary" onclick="editCertificate(${cert.id})">수정</button>
                        <button class="danger" onclick="deleteCertificate(${cert.id})">삭제</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 경력 표시
        function renderExperiences() {
            const list = document.getElementById('experienceList');
            list.innerHTML = '';

            if (userData.experiences.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>아직 등록한 경력이 없습니다</p></div>';
                return;
            }

            userData.experiences.forEach(exp => {
                const endDate = exp.isCurrent ? '현재' : exp.end;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-content">
                        <h4>${exp.position}</h4>
                        <p>${exp.company} | ${exp.start} ~ ${endDate}</p>
                        ${exp.description ? `<p>${exp.description}</p>` : ''}
                    </div>
                    <div class="item-actions">
                        <button class="secondary" onclick="editExperience(${exp.id})">수정</button>
                        <button class="danger" onclick="deleteExperience(${exp.id})">삭제</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 스카웃 표시
        function renderScouts() {
            const list = document.getElementById('scoutList');
            list.innerHTML = '';

            const activeTab = document.querySelector('.tab.active').textContent.split(':')[0].trim();
            let scouts = [];

            if (activeTab === '받은 스카웃') {
                scouts = userData.scouts.received;
                document.getElementById('scoutCount').textContent = scouts.length;
            } else if (activeTab === '거절한 스카웃') {
                scouts = userData.scouts.rejected;
            } else if (activeTab === '수락한 스카웃') {
                scouts = userData.scouts.accepted;
            }

            if (scouts.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>스카웃이 없습니다</p></div>';
                return;
            }

            scouts.forEach(scout => {
                const card = document.createElement('div');
                card.className = 'scout-card';
                let badgeHtml = '';
                let actionsHtml = '';

                if (scout.status === 'pending') {
                    badgeHtml = `<div class="scout-badge">🔴 ${scout.expiresDays}일 남음</div>`;
                    actionsHtml = `
                        <div class="scout-actions">
                            <button class="primary" onclick="acceptScout(${scout.id})">수락</button>
                            <button class="danger" onclick="rejectScout(${scout.id})">거절</button>
                        </div>
                    `;
                } else if (scout.status === 'accepted') {
                    badgeHtml = '<div class="scout-badge" style="background-color: var(--color-primary-green);">✓ 수락됨</div>';
                } else if (scout.status === 'rejected') {
                    badgeHtml = '<div class="scout-badge" style="background-color: var(--color-medium-gray);">✗ 거절됨</div>';
                }

                card.innerHTML = `
                    <div class="scout-card-header">
                        <div>
                            <div class="scout-company">${scout.company}</div>
                            <div class="scout-position">${scout.position}</div>
                        </div>
                        ${badgeHtml}
                    </div>
                    <div class="scout-message">"${scout.message}"</div>
                    <div class="scout-meta">연봉: ${scout.salary}</div>
                    ${actionsHtml}
                `;
                list.appendChild(card);
            });
        }

        // 스카웃 탭 전환
        function switchScoutTab(tab, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            renderScouts();
        }

        // 자격증 모달
        function openCertificateModal() {
            editingId = null;
            document.getElementById('certTitle').textContent = '자격증 추가';
            document.getElementById('certificateForm').reset();
            document.getElementById('certificateModal').classList.add('active');
        }

        function closeCertificateModal() {
            document.getElementById('certificateModal').classList.remove('active');
            editingId = null;
        }

        function editCertificate(id) {
            const cert = userData.certificates.find(c => c.id === id);
            if (cert) {
                editingId = id;
                document.getElementById('certTitle').textContent = '자격증 수정';
                document.getElementById('certName').value = cert.name;
                document.getElementById('certIssued').value = cert.issued;
                document.getElementById('certExpires').value = cert.expires;
                document.getElementById('certIssuer').value = cert.issuer;
                document.getElementById('certificateModal').classList.add('active');
            }
        }

        function saveCertificate(e) {
            e.preventDefault();
            const cert = {
                id: editingId || Date.now(),
                name: document.getElementById('certName').value,
                issued: document.getElementById('certIssued').value,
                expires: document.getElementById('certExpires').value,
                issuer: document.getElementById('certIssuer').value
            };

            if (editingId) {
                const index = userData.certificates.findIndex(c => c.id === editingId);
                userData.certificates[index] = cert;
            } else {
                userData.certificates.push(cert);
            }

            renderCertificates();
            closeCertificateModal();
        }

        function deleteCertificate(id) {
            if (confirm('정말 삭제하시겠습니까?')) {
                userData.certificates = userData.certificates.filter(c => c.id !== id);
                renderCertificates();
            }
        }

        // 경력 모달
        function openExperienceModal() {
            editingId = null;
            document.getElementById('expTitle').textContent = '경력 추가';
            document.getElementById('experienceForm').reset();
            document.getElementById('experienceModal').classList.add('active');
        }

        function closeExperienceModal() {
            document.getElementById('experienceModal').classList.remove('active');
            editingId = null;
        }

        function editExperience(id) {
            const exp = userData.experiences.find(e => e.id === id);
            if (exp) {
                editingId = id;
                document.getElementById('expTitle').textContent = '경력 수정';
                document.getElementById('expCompany').value = exp.company;
                document.getElementById('expPosition').value = exp.position;
                document.getElementById('expStart').value = exp.start;
                document.getElementById('expEnd').value = exp.end;
                document.getElementById('isCurrent').checked = exp.isCurrent;
                document.getElementById('expDescription').value = exp.description;
                document.getElementById('experienceModal').classList.add('active');
            }
        }

        function saveExperience(e) {
            e.preventDefault();
            const exp = {
                id: editingId || Date.now(),
                company: document.getElementById('expCompany').value,
                position: document.getElementById('expPosition').value,
                start: document.getElementById('expStart').value,
                end: document.getElementById('expEnd').value,
                isCurrent: document.getElementById('isCurrent').checked,
                description: document.getElementById('expDescription').value
            };

            if (editingId) {
                const index = userData.experiences.findIndex(e => e.id === editingId);
                userData.experiences[index] = exp;
            } else {
                userData.experiences.push(exp);
            }

            renderExperiences();
            closeExperienceModal();
        }

        function deleteExperience(id) {
            if (confirm('정말 삭제하시겠습니까?')) {
                userData.experiences = userData.experiences.filter(e => e.id !== id);
                renderExperiences();
            }
        }

        // 스카웃 수락/거절
        function acceptScout(id) {
            const scout = userData.scouts.received.find(s => s.id === id);
            if (scout) {
                scout.status = 'accepted';
                userData.scouts.accepted.push(userData.scouts.received.splice(userData.scouts.received.indexOf(scout), 1)[0]);
                renderScouts();
            }
        }

        function rejectScout(id) {
            const scout = userData.scouts.received.find(s => s.id === id);
            if (scout) {
                scout.status = 'rejected';
                userData.scouts.rejected.push(userData.scouts.received.splice(userData.scouts.received.indexOf(scout), 1)[0]);
                renderScouts();
            }
        }

        // 기타 함수
        function editProfile() {
            alert('프로필 편집 기능은 준비 중입니다.');
        }

        function editEducation() {
            alert('교육정보 수정 기능은 준비 중입니다.');
        }

        function editGPA() {
            alert('학점 수정 기능은 준비 중입니다.');
        }

        function openSettings() {
            alert('설정 기능은 준비 중입니다.');
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            alert('로그아웃되었습니다.');
            window.location.href = 'LoginSignUpPage.html';
        }

        function deleteAccount() {
            if (confirm('정말 계정을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                localStorage.clear();
                alert('계정이 삭제되었습니다.');
                window.location.href = 'LoginSignUpPage.html';
            }
        }

        function goBack() {
            window.history.back();
        }

        // 페이지 로드
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
