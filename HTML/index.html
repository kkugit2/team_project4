<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container center-page">
    <div class="auth-shell">
      <div class="card">
        <h1 style="text-align:center; margin-bottom:4px;">매치보드</h1>
        <p class="muted" style="text-align:center; margin-bottom:24px;">
          원티드 채용 데이터 기반 구직자·기업 매칭 플랫폼
        </p>

        <form id="login-form">
          <div class="field">
            <label for="login-email">이메일</label>
            <input type="email" id="login-email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="login-password">비밀번호</label>
            <input type="password" id="login-password" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="notice-box" style="display:none; margin-bottom:16px; color:var(--warn);"></div>
          <button type="submit" class="btn btn-primary btn-block" id="login-submit">로그인</button>
        </form>

        <p class="muted" style="text-align:center; margin-top:20px; font-size:13px;">
          처음이신가요? <a href="signup.html">회원가입</a>
        </p>
      </div>
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { supabase, getCurrentProfile } from "./js/supabaseClient.js";
    import { tryConsumePendingSignup } from "./js/auth.js";

    initNav(null);

    // 이미 로그인되어 있으면 역할별 홈으로 바로 이동
    const { user, role } = await getCurrentProfile();
    if (user && role) {
      window.location.href = role === "company" ? "company-home.html" : "jobseeker-home.html";
    }

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("login-error");
    const submitBtn = document.getElementById("login-submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "로그인 중...";

      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorBox.textContent = error.message.includes("Invalid")
          ? "이메일 또는 비밀번호가 올바르지 않습니다."
          : error.message;
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "로그인";
        return;
      }

      // 이메일 인증 대기 중 가입한 사용자라면, 최초 로그인 시점에 보류된 프로필을 생성
      const role = await tryConsumePendingSignup(data.user);

      window.location.href = role === "company" ? "company-home.html" : "jobseeker-home.html";
    });
  </script>
</body>
</html>
