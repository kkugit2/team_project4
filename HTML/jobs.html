<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 공고 둘러보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
  .job-card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
  .job-card .top-row { display: flex; align-items: center; gap: 10px; }
  .job-card .logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: var(--navy-100); flex-shrink: 0; }
  .job-card .company-name { font-size: 13px; color: var(--muted); }
  .job-card .job-name { font-size: 15px; font-weight: 700; line-height: 1.35; min-height: 40px; }
  .job-card .bottom-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .bookmark-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--line); line-height: 1; }
  .bookmark-btn.active { color: var(--warn); }
  .login-banner { background: var(--navy-100); border-radius: var(--radius-card); padding: 14px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container page-body">
    <h1>공고 둘러보기</h1>

    <div id="login-banner" class="login-banner" style="display:none;">
      <span>로그인하면 합격확률·찜·지원현황을 확인할 수 있어요.</span>
      <a class="btn btn-secondary btn-sm" href="index.html">로그인</a>
    </div>

    <div class="row between wrap" style="margin-bottom:20px;">
      <div class="row wrap" id="filter-pills"></div>
      <div class="row">
        <select id="sort-select">
          <option value="match">매칭도순</option>
          <option value="due">마감임박순</option>
          <option value="latest">최신순</option>
        </select>
        <label class="row" style="font-size:13px; gap:6px; margin:0;" id="bookmark-filter-wrap" style="display:none;">
          <input type="checkbox" id="bookmark-filter" />
          찜한 공고만
        </label>
      </div>
    </div>

    <section id="job-grid" class="grid-cards"></section>
    <div id="empty-state" class="empty-state" style="display:none;">
      조건에 맞는 공고가 없습니다 → 다른 직군 필터를 선택해보세요.
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { supabase, getCurrentProfile } from "./js/supabaseClient.js";
    import { computeJobMatchScore } from "./js/matching.js";
    import { gaugeHtml } from "./js/gauge.js";
    import { DUMMY_JOBSEEKERS } from "./js/dummyData.js";

    const { user, role } = await getCurrentProfile();
    await initNav("jobs");

    const isJobseeker = !!user && role === "jobseeker";
    if (!isJobseeker) {
      document.getElementById("login-banner").style.display = "flex";
    } else {
      document.getElementById("bookmark-filter-wrap").style.display = "flex";
    }

    // 더미 공고 데이터
    const dummyJobs = [
      { id: 1, company_id: 1, name: "백엔드 개발자", category_parent: "개발", employment_type: "정규직", due_time: "2026-08-31", annual_from: 0, annual_to: 3, skill_tags: [{ title: "Python" }, { title: "Django" }, { title: "PostgreSQL" }], requirements: "Python, Django 경험", preferred_points: "AWS 경험", companies: { name: "라인", logo_url: null } },
      { id: 2, company_id: 2, name: "프론트엔드 개발자", category_parent: "개발", employment_type: "정규직", due_time: "2026-08-20", annual_from: 1, annual_to: 5, skill_tags: [{ title: "React" }, { title: "JavaScript" }, { title: "TypeScript" }], requirements: "React, JavaScript", preferred_points: "Next.js 경험", companies: { name: "토스", logo_url: null } },
      { id: 3, company_id: 3, name: "데이터 엔지니어", category_parent: "데이터", employment_type: "정규직", due_time: "2026-09-15", annual_from: 2, annual_to: 6, skill_tags: [{ title: "Python" }, { title: "SQL" }, { title: "Spark" }], requirements: "SQL, Python", preferred_points: "Spark, Hadoop", companies: { name: "당근마켓", logo_url: null } },
      { id: 4, company_id: 4, name: "머신러닝 엔지니어", category_parent: "AI", employment_type: "정규직", due_time: "2026-09-30", annual_from: 3, annual_to: 8, skill_tags: [{ title: "Python" }, { title: "TensorFlow" }, { title: "PyTorch" }], requirements: "Python, ML 경험", preferred_points: "딥러닝, 논문 경험", companies: { name: "네이버", logo_url: null } },
      { id: 5, company_id: 5, name: "DevOps 엔지니어", category_parent: "인프라", employment_type: "정규직", due_time: "2026-08-25", annual_from: 2, annual_to: 7, skill_tags: [{ title: "Kubernetes" }, { title: "Docker" }, { title: "AWS" }], requirements: "Docker, Kubernetes", preferred_points: "Terraform, CI/CD", companies: { name: "쿠팡", logo_url: null } }
    ];

    let profile = DUMMY_JOBSEEKERS[0];
    let bookmarkedIds = new Set([1, 3]);
    let appliedIds = new Set([2]);

    const allJobs = jobs || [];
    const categories = [...new Set(allJobs.map((j) => j.category_parent).filter(Boolean))].sort();

    let activeCategory = "all";
    let activeSort = "match";
    let bookmarkOnly = false;

    renderFilterPills();
    render();

    document.getElementById("sort-select").addEventListener("change", (e) => {
      activeSort = e.target.value;
      render();
    });
    document.getElementById("bookmark-filter")?.addEventListener("change", (e) => {
      bookmarkOnly = e.target.checked;
      render();
    });

    function renderFilterPills() {
      const wrap = document.getElementById("filter-pills");
      const pills = ["all", ...categories];
      wrap.innerHTML = pills
        .map(
          (c) =>
            `<button class="filter-pill ${c === activeCategory ? "active" : ""}" data-cat="${escapeAttr(c)}">${c === "all" ? "전체" : escapeAttr(c)}</button>`
        )
        .join("");
      wrap.querySelectorAll(".filter-pill").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.cat;
          renderFilterPills();
          render();
        });
      });
    }

    function render() {
      let list = allJobs.filter((j) => activeCategory === "all" || j.category_parent === activeCategory);
      if (bookmarkOnly) list = list.filter((j) => bookmarkedIds.has(j.id));

      const withScore = list.map((j) => ({
        job: j,
        match: profile ? computeJobMatchScore(profile, j) : null,
      }));

      if (activeSort === "match" && profile) {
        withScore.sort((a, b) => (b.match?.score || 0) - (a.match?.score || 0));
      } else if (activeSort === "due") {
        withScore.sort((a, b) => new Date(a.job.due_time || "9999-12-31") - new Date(b.job.due_time || "9999-12-31"));
      } else {
        withScore.sort((a, b) => b.job.id - a.job.id);
      }

      const grid = document.getElementById("job-grid");
      document.getElementById("empty-state").style.display = withScore.length ? "none" : "block";

      grid.innerHTML = withScore
        .map(({ job, match }) => {
          const company = job.companies || {};
          const logo = company.logo_url
            ? `<img class="logo" src="${escapeAttr(company.logo_url)}" alt="" />`
            : `<div class="logo"></div>`;

          let badgeHtml;
          if (!isJobseeker) {
            badgeHtml = `<span class="pill pill-muted">로그인 후 확인</span>`;
          } else if (!profile || (!profile.career_years && !profile.skills?.length)) {
            badgeHtml = `<span class="pill pill-muted">마이페이지에서 경력 입력 시 확인 가능</span>`;
          } else {
            badgeHtml = gaugeHtml(match.score, { size: 56, stroke: 6, unit: "AI 예측(참고용)" });
          }

          const appliedBadge = appliedIds.has(job.id) ? `<span class="pill pill-good">지원함</span>` : "";
          const bookmarkBtn = isJobseeker
            ? `<button class="bookmark-btn ${bookmarkedIds.has(job.id) ? "active" : ""}" data-job-id="${job.id}" title="찜하기">${bookmarkedIds.has(job.id) ? "♥" : "♡"}</button>`
            : "";

          return `
            <div class="card job-card" data-company-id="${job.company_id}" data-job-id="${job.id}">
              <div class="top-row">
                ${logo}
                <div>
                  <div class="company-name">${escapeAttr(company.name || "")}</div>
                  <span class="chip">${escapeAttr(job.category_parent || "")}</span>
                </div>
              </div>
              <div class="job-name">${escapeAttr(job.name)}</div>
              <div class="row wrap" style="font-size:12px; color:var(--muted);">
                <span>마감 ${job.due_time ? escapeAttr(job.due_time) : "상시"}</span>
                ${appliedBadge}
              </div>
              <div class="bottom-row">
                ${badgeHtml}
                ${bookmarkBtn}
              </div>
            </div>`;
        })
        .join("");

      grid.querySelectorAll(".job-card").forEach((card) => {
        card.addEventListener("click", (e) => {
          if (e.target.closest(".bookmark-btn")) return;
          const companyId = card.dataset.companyId;
          const jobId = card.dataset.jobId;
          window.location.href = `company-detail.html?company_id=${companyId}&job_id=${jobId}`;
        });
      });

      grid.querySelectorAll(".bookmark-btn").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const jobId = Number(btn.dataset.jobId);
          if (bookmarkedIds.has(jobId)) {
            await supabase.from("bookmarks").delete().eq("user_id", user.id).eq("job_id", jobId);
            bookmarkedIds.delete(jobId);
          } else {
            await supabase.from("bookmarks").insert({ user_id: user.id, job_id: jobId });
            bookmarkedIds.add(jobId);
          }
          render();
        });
      });
    }

    function escapeAttr(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
