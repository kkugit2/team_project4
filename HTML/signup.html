<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 회원가입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container page-body">
    <div class="auth-shell wide">
      <div id="role-back-link" style="display:none; margin-bottom:12px;">
        <a href="#" id="role-back">← 역할 다시 선택</a>
      </div>

      <div id="role-select-section">
        <h1 style="text-align:center;">어떤 역할로 시작할까요?</h1>
        <p class="muted" style="text-align:center;">가입 후에는 역할을 바꿀 수 없어요. 신중하게 선택해주세요.</p>
        <div class="role-select-grid">
          <a href="#" class="role-card" id="role-jobseeker">
            <div class="icon">🧑‍💻</div>
            <h3>구직자로 시작하기</h3>
            <p>내 시장 위치를 확인하고 맞춤 공고를 추천받아요</p>
          </a>
          <a href="#" class="role-card" id="role-company">
            <div class="icon">🏢</div>
            <h3>기업으로 시작하기</h3>
            <p>인재상에 맞는 지원자를 찾고 스카웃을 보내요</p>
          </a>
        </div>
      </div>

      <div class="card" id="signup-form-section" style="display:none;"></div>
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { renderJobseekerForm, renderCompanyForm, submitSignup } from "./js/auth.js";

    initNav(null);

    const roleSelectSection = document.getElementById("role-select-section");
    const formSection = document.getElementById("signup-form-section");
    const backLinkWrap = document.getElementById("role-back-link");

    function showRoleForm(role) {
      roleSelectSection.style.display = "none";
      formSection.style.display = "block";
      backLinkWrap.style.display = "block";

      const handle = role === "company" ? renderCompanyForm(formSection) : renderJobseekerForm(formSection);

      document.getElementById("signup-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await submitSignup(role, handle, "signup-error", "signup-submit");
      });
    }

    document.getElementById("role-jobseeker").addEventListener("click", (e) => {
      e.preventDefault();
      showRoleForm("jobseeker");
    });
    document.getElementById("role-company").addEventListener("click", (e) => {
      e.preventDefault();
      showRoleForm("company");
    });
    document.getElementById("role-back").addEventListener("click", (e) => {
      e.preventDefault();
      formSection.style.display = "none";
      formSection.innerHTML = "";
      backLinkWrap.style.display = "none";
      roleSelectSection.style.display = "block";
    });
  </script>
</body>
</html>
