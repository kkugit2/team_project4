<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 자소서 피드백</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container page-body">
    <h1>자소서 작성 후 피드백</h1>
    <p class="muted">자소서를 입력하면 선택한 공고 기준으로 강점·보완점을 확인할 수 있어요.</p>

    <div class="card" style="margin-bottom:20px;">
      <div class="field">
        <label for="job-select">대상 공고</label>
        <select id="job-select"></select>
      </div>
      <div class="field">
        <label for="resume-text">자소서 내용</label>
        <textarea id="resume-text" rows="10" placeholder="자소서 내용을 입력해주세요"></textarea>
      </div>
      <button class="btn btn-primary" id="analyze-btn">분석하기</button>
    </div>

    <div id="result-section" style="display:none;">
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">자소서 원문</div>
        <p id="resume-echo" style="white-space:pre-line; font-size:13.5px;"></p>
      </div>

      <div class="split" style="grid-template-columns: 1fr 1fr; margin-bottom:16px;">
        <div class="good-card">
          <h3>강점</h3>
          <ul id="strengths-list" style="margin:0; padding-left:18px;"></ul>
        </div>
        <div class="warn-card">
          <h3>보완하면 좋은 점</h3>
          <ul id="improvements-list" style="margin:0; padding-left:18px;"></ul>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">경쟁자 비교</div>
        <div id="competitor-compare"></div>
      </div>

      <div class="card">
        <label class="checkbox-row" style="margin-bottom:14px;">
          <input type="checkbox" id="share-consent" />
          <span>이 자소서 요약을 관심 있는 기업에게 공유합니다 (동의 시에만 기업 대시보드에 익명으로 노출돼요).</span>
        </label>
        <button class="btn btn-primary" id="submit-btn">제출하기</button>
        <span id="submit-msg" class="muted" style="margin-left:10px; font-size:13px;"></span>
      </div>
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { supabase, requireRole } from "./js/supabaseClient.js";
    import { analyzeResume } from "./js/resumeAnalysis.js";

    const auth = await requireRole(["jobseeker"]);
    if (!auth) throw new Error("redirecting");
    await initNav(null);

    const params = new URLSearchParams(window.location.search);
    const preselectJobId = Number(params.get("job_id")) || null;

    const { data: jobs } = await supabase
      .from("jobs")
      .select("id, name, skill_tags, requirements, preferred_points, companies(name)")
      .order("id", { ascending: false });

    const jobSelect = document.getElementById("job-select");
    jobSelect.innerHTML = (jobs || [])
      .map((j) => `<option value="${j.id}">${escapeHtml(j.companies?.name || "")} — ${escapeHtml(j.name)}</option>`)
      .join("");
    if (preselectJobId) jobSelect.value = String(preselectJobId);

    const { data: profile } = await supabase
      .from("jobseeker_profile")
      .select("resume_text")
      .eq("user_id", auth.user.id)
      .maybeSingle();
    if (profile?.resume_text) document.getElementById("resume-text").value = profile.resume_text;

    let currentJob = null;
    let lastSelfIntroId = null;

    document.getElementById("analyze-btn").addEventListener("click", async () => {
      const jobId = Number(jobSelect.value);
      currentJob = (jobs || []).find((j) => j.id === jobId);
      const resumeText = document.getElementById("resume-text").value.trim();

      if (!resumeText) {
        alert("자소서 내용을 입력해주세요.");
        return;
      }
      if (!currentJob) return;

      const result = analyzeResume(resumeText, currentJob);

      document.getElementById("result-section").style.display = "block";
      document.getElementById("resume-echo").textContent = resumeText;
      document.getElementById("strengths-list").innerHTML = result.strengths.map((s) => `<li>${escapeHtml(s)}</li>`).join("");
      document.getElementById("improvements-list").innerHTML = result.improvements.map((s) => `<li>${escapeHtml(s)}</li>`).join("");

      await renderCompetitorCompare(jobId);
    });

    async function renderCompetitorCompare(jobId) {
      const el = document.getElementById("competitor-compare");
      el.innerHTML = `<div class="muted">비교 데이터를 불러오는 중...</div>`;

      const { data, error } = await supabase.rpc("get_job_applicant_stats", { p_job_id: jobId });
      const stats = Array.isArray(data) ? data[0] : data;

      if (error || !stats || !stats.min_sample_met) {
        el.innerHTML = `<div class="notice-box">비교 데이터 부족 — 이 공고에 자소서를 제출한 인원이 5명 미만입니다.</div>`;
        return;
      }

      const { data: myProfile } = await supabase
        .from("jobseeker_profile")
        .select("career_years, skills")
        .eq("user_id", auth.user.id)
        .maybeSingle();

      const myCareer = Number(myProfile?.career_years) || 0;
      const mySkillCount = (myProfile?.skills || []).length;
      const avgCareer = Number(stats.avg_career_years) || 0;
      const avgSkill = Number(stats.avg_skill_count) || 0;

      el.innerHTML = compareBar("경력 연차", myCareer, avgCareer) + compareBar("보유 기술 수", mySkillCount, avgSkill) +
        `<div class="compare-legend">
          <span><span class="dot" style="background:var(--navy)"></span>나</span>
          <span><span class="dot" style="background:var(--navy-mid)"></span>동일 공고 지원자 평균</span>
        </div>`;
    }

    function compareBar(label, me, avg) {
      const max = Math.max(me, avg, 1) * 1.3;
      const meW = Math.min(100, (me / max) * 100);
      const avgW = Math.min(100, (avg / max) * 100);
      return `
        <div class="compare-bar-row">
          <div class="bar-label">${label} — 나: ${me.toFixed(1)} · 평균: ${avg.toFixed(1)}</div>
          <div class="compare-bar-track">
            <div class="compare-bar-fill avg" style="width:${avgW}%"></div>
            <div class="compare-bar-fill" style="width:${meW}%; height:10px; top:6px;"></div>
          </div>
        </div>`;
    }

    document.getElementById("submit-btn").addEventListener("click", async () => {
      const resumeText = document.getElementById("resume-text").value.trim();
      const shared = document.getElementById("share-consent").checked;
      const msgEl = document.getElementById("submit-msg");
      if (!currentJob || !resumeText) return;

      const result = analyzeResume(resumeText, currentJob);

      const { data: intro, error: introErr } = await supabase
        .from("self_intros")
        .insert({ user_id: auth.user.id, job_id: currentJob.id, content: resumeText, shared_with_company: shared })
        .select()
        .single();

      if (introErr) {
        msgEl.textContent = "제출 중 오류가 발생했습니다.";
        console.error(introErr);
        return;
      }

      await supabase.from("feedback_results").insert({
        self_intro_id: intro.id,
        strengths: result.strengths,
        improvements: result.improvements,
      });

      msgEl.textContent = shared ? "제출 완료 — 기업에 익명으로 공유돼요." : "제출 완료 — 기업 공유는 하지 않아요.";
    });

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
