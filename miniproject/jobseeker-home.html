<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 내 통계</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container page-body">
    <h1>내 통계 분석</h1>
    <p class="muted">회원가입 시 입력한 정보를 기준으로 산출한 나의 시장 위치예요. 공고 탐색은 상단 메뉴의 "공고 둘러보기"에서 진행해주세요.</p>

    <div id="incomplete-notice" class="notice-box" style="display:none; margin-bottom:20px;">
      아직 등록된 경력/기술 정보가 없어요 → <a href="mypage.html">마이페이지</a>에서 프로필을 입력하면 더 정확한 분석을 볼 수 있어요.
    </div>

    <section id="stat-section" class="stat-grid" style="margin-bottom:24px;"></section>

    <section class="card" style="margin-bottom:16px;">
      <div class="card-title">동일 시장 평균과 비교</div>
      <div id="compare-chart"></div>
    </section>

    <section class="card" style="margin-bottom:16px;">
      <div class="card-title">보유 기술 구성</div>
      <div id="skill-donut"></div>
    </section>

    <div class="split" style="grid-template-columns: 1fr 1fr;">
      <div class="good-card">
        <h3>강점</h3>
        <ul id="strengths-list" style="margin:0; padding-left:18px;"></ul>
      </div>
      <div class="warn-card">
        <h3>보완하면 좋은 점</h3>
        <ul id="improvements-list" style="margin:0; padding-left:18px;"></ul>
      </div>
    </div>
  </main>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { supabase, requireRole } from "./js/supabaseClient.js";
    import { computeJobseekerInsights } from "./js/insights.js";

    const auth = await requireRole(["jobseeker"]);
    if (!auth) throw new Error("redirecting");
    await initNav("home");

    const { data: profile, error: profileErr } = await supabase
      .from("jobseeker_profile")
      .select("*")
      .eq("user_id", auth.user.id)
      .maybeSingle();

    if (profileErr) {
      console.error(profileErr);
    }

    const { data: jobs, error: jobsErr } = await supabase
      .from("jobs")
      .select("annual_from, annual_to, skill_tags");

    if (jobsErr) console.error(jobsErr);

    const safeProfile = profile || { career_years: 0, skills: [], certifications: [] };
    const insights = computeJobseekerInsights(safeProfile, jobs || []);

    if (!safeProfile.skills?.length && !safeProfile.career_years && !safeProfile.certifications?.length) {
      document.getElementById("incomplete-notice").style.display = "block";
    }

    renderStats(insights.stats);
    renderCompareChart(insights.compareCareer, insights.compareSkills);
    renderDonut(insights.skillDonut);
    renderList("strengths-list", insights.strengths);
    renderList("improvements-list", insights.improvements);

    function renderStats(stats) {
      const items = [
        { label: "경력 연차", value: stats.careerYears.toFixed(1), unit: "년" },
        { label: "보유 기술 수", value: stats.skillCount, unit: "개" },
        { label: "자격증 수", value: stats.certCount, unit: "개" },
        { label: "지원 가능 공고 수", value: stats.eligibleJobCount, unit: "건" },
      ];
      document.getElementById("stat-section").innerHTML = items
        .map(
          (i) => `
        <div class="stat-card">
          <div class="stat-label">${i.label}</div>
          <div><span class="stat-value">${i.value}</span><span class="stat-unit">${i.unit}</span></div>
        </div>`
        )
        .join("");
    }

    function compareBarRow(label, me, avg, maxScale) {
      const meWidth = Math.min(100, (me / maxScale) * 100);
      const avgWidth = Math.min(100, (avg / maxScale) * 100);
      return `
        <div class="compare-bar-row">
          <div class="bar-label">${label} — 나: ${me.toFixed(1)} · 평균: ${avg.toFixed(1)}</div>
          <div class="compare-bar-track">
            <div class="compare-bar-fill avg" style="width:${avgWidth}%"></div>
            <div class="compare-bar-fill" style="width:${meWidth}%; height:10px; top:6px;"></div>
          </div>
        </div>`;
    }

    function renderCompareChart(compareCareer, compareSkills) {
      const maxCareer = Math.max(compareCareer.me, compareCareer.marketAvg, 3) * 1.3;
      const maxSkills = Math.max(compareSkills.me, compareSkills.marketAvg, 3) * 1.3;
      document.getElementById("compare-chart").innerHTML =
        compareBarRow("경력 연차 (년)", compareCareer.me, compareCareer.marketAvg, maxCareer) +
        compareBarRow("보유 기술 수 (개)", compareSkills.me, compareSkills.marketAvg, maxSkills) +
        `<div class="compare-legend">
          <span><span class="dot" style="background:var(--navy)"></span>나</span>
          <span><span class="dot" style="background:var(--navy-mid)"></span>공고 평균</span>
        </div>`;
    }

    function renderDonut(donutData) {
      const el = document.getElementById("skill-donut");
      if (!donutData.length) {
        el.innerHTML = `<div class="empty-state">보유 기술이 없습니다 → 마이페이지에서 기술 스택을 입력해주세요.</div>`;
        return;
      }
      const colors = ["var(--navy)", "var(--navy-mid)", "var(--navy-100)", "#B7C4D6", "#8AA0BC"];
      let acc = 0;
      const stops = donutData
        .map((d, i) => {
          const start = acc;
          acc += d.pct;
          return `${colors[i % colors.length]} ${start}% ${acc}%`;
        })
        .join(", ");

      const legend = donutData
        .map(
          (d, i) => `
        <div class="item">
          <span class="swatch" style="background:${colors[i % colors.length]}"></span>
          <span>${d.label}</span>
          <span class="count">${d.count}개 (${d.pct}%)</span>
        </div>`
        )
        .join("");

      el.innerHTML = `
        <div class="donut-wrap">
          <div class="donut" style="background: conic-gradient(${stops});"></div>
          <div class="donut-legend">${legend}</div>
        </div>`;
    }

    function renderList(id, items) {
      document.getElementById(id).innerHTML = items.map((t) => `<li>${t}</li>`).join("");
    }
  </script>
</body>
</html>
