<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>매치보드 — 기업 상세</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<style>
  .company-header { display: flex; gap: 18px; align-items: flex-start; }
  .company-header .logo { width: 72px; height: 72px; border-radius: 12px; object-fit: cover; background: var(--navy-100); flex-shrink: 0; }
  .company-desc { white-space: pre-line; font-size: 13.5px; color: var(--muted); margin-top: 10px; }
  .position-card { border: 1px solid var(--line); border-radius: var(--radius-card); padding: 16px; margin-bottom: 14px; }
  .position-card.highlight { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy); }
  .position-card h3 { margin-bottom: 6px; }
  .apply-section { text-align: right; }
  .apply-notice { font-size: 11.5px; color: var(--muted); margin-top: 6px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(19,26,36,0.4); display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal-box { background: var(--paper); border: 1px dashed var(--navy); border-radius: var(--radius-card); padding: 24px; max-width: 360px; text-align: center; }
  .modal-box .btn-row { display: flex; gap: 10px; margin-top: 16px; }
</style>
</head>
<body>
  <div id="topnav-root"></div>

  <main class="container page-body">
    <div id="company-info" class="card"></div>

    <h2 style="margin-top:28px;">채용중인 포지션</h2>
    <div id="position-list"></div>
    <div id="empty-jobs" class="empty-state" style="display:none;">현재 등록된 채용 포지션이 없습니다.</div>
  </main>

  <div class="modal-overlay" id="apply-modal">
    <div class="modal-box">
      <h3>지원을 완료하셨나요?</h3>
      <p class="muted" style="font-size:13px;">외부 사이트(원티드)에서 실제 지원 여부를 확인할 수 없어 자진 신고 방식으로 기록해요.</p>
      <div class="btn-row">
        <button class="btn btn-ghost btn-block" id="apply-no">아니요</button>
        <button class="btn btn-primary btn-block" id="apply-yes">네, 완료했어요</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initNav } from "./js/nav.js";
    import { supabase, getCurrentProfile } from "./js/supabaseClient.js";

    const params = new URLSearchParams(window.location.search);
    const companyId = Number(params.get("company_id"));
    const highlightJobId = Number(params.get("job_id")) || null;

    const { user, role } = await getCurrentProfile();
    await initNav(null);

    const isJobseeker = !!user && role === "jobseeker";

    const { data: company, error: companyErr } = await supabase
      .from("companies")
      .select("*")
      .eq("id", companyId)
      .maybeSingle();

    if (companyErr || !company) {
      document.getElementById("company-info").innerHTML = `<div class="empty-state">기업 정보를 찾을 수 없습니다.</div>`;
      throw new Error("company not found");
    }

    document.title = `매치보드 — ${company.name}`;
    document.getElementById("company-info").innerHTML = `
      <div class="company-header">
        ${company.logo_url ? `<img class="logo" src="${escapeAttr(company.logo_url)}" alt="" />` : `<div class="logo"></div>`}
        <div>
          <h1 style="margin-bottom:2px;">${escapeAttr(company.name)}</h1>
          ${company.address ? `<div class="muted" style="font-size:13px;">${escapeAttr(company.address)}</div>` : ""}
        </div>
      </div>
      <div class="company-desc">${escapeAttr(company.description || "등록된 회사 소개가 없습니다.")}</div>
      ${company.link ? `<div style="margin-top:10px;"><a href="${normalizeUrl(company.link)}" target="_blank" rel="noopener">회사 홈페이지 ↗</a></div>` : ""}
    `;

    const { data: jobsList } = await supabase
      .from("jobs")
      .select("*")
      .eq("company_id", companyId)
      .order("id", { ascending: false });

    let appliedIds = new Set();
    if (isJobseeker) {
      const { data: applications } = await supabase.from("applications").select("job_id").eq("user_id", user.id);
      appliedIds = new Set((applications || []).map((a) => a.job_id));
    }

    renderJobs(jobsList || []);

    function renderJobs(jobsList) {
      document.getElementById("empty-jobs").style.display = jobsList.length ? "none" : "block";
      const wrap = document.getElementById("position-list");
      wrap.innerHTML = jobsList
        .map((job) => {
          const skillChips = (job.skill_tags || [])
            .slice(0, 6)
            .map((t) => `<span class="chip">${escapeAttr(t.title)}</span>`)
            .join(" ");
          const applied = appliedIds.has(job.id);
          return `
          <div class="position-card ${job.id === highlightJobId ? "highlight" : ""}" data-job-id="${job.id}">
            <h3>${escapeAttr(job.name)}</h3>
            <div class="row wrap" style="font-size:12.5px; color:var(--muted); margin-bottom:8px;">
              <span>${escapeAttr(job.employment_type || "")}</span>
              <span>·</span>
              <span>마감 ${job.due_time ? escapeAttr(job.due_time) : "상시"}</span>
              <span>·</span>
              <span>경력 ${job.annual_from ?? 0}${job.annual_to ? `~${job.annual_to}` : "+"}년</span>
            </div>
            ${skillChips ? `<div class="row wrap" style="margin-bottom:8px;">${skillChips}</div>` : ""}
            ${job.main_tasks ? `<p style="font-size:13px;"><strong>주요 업무</strong><br />${escapeAttr(job.main_tasks)}</p>` : ""}
            ${job.requirements ? `<p style="font-size:13px;"><strong>자격 요건</strong><br />${escapeAttr(job.requirements)}</p>` : ""}
            <div class="apply-section">
              ${applied ? `<span class="pill pill-good" style="margin-right:8px;">지원함</span>` : ""}
              ${isJobseeker ? `<a href="resume-feedback.html?job_id=${job.id}" class="btn btn-ghost btn-sm" style="margin-right:8px;">자소서 피드백 받기</a>` : ""}
              <button class="btn btn-primary apply-btn" data-job-id="${job.id}" data-url="${escapeAttr(job.url || "")}">원티드에서 지원하기 ↗</button>
              <div class="apply-notice">클릭 시 외부 사이트(원티드)로 이동합니다.</div>
            </div>
          </div>`;
        })
        .join("");

      wrap.querySelectorAll(".apply-btn").forEach((btn) => {
        btn.addEventListener("click", () => onApplyClick(Number(btn.dataset.jobId), btn.dataset.url));
      });
    }

    let pendingApplyJobId = null;

    function onApplyClick(jobId, url) {
      if (url) window.open(normalizeUrl(url), "_blank", "noopener");
      if (isJobseeker) pendingApplyJobId = jobId;
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && pendingApplyJobId != null) {
        document.getElementById("apply-modal").style.display = "flex";
      }
    });

    document.getElementById("apply-yes").addEventListener("click", async () => {
      if (pendingApplyJobId != null) {
        await supabase
          .from("applications")
          .upsert({ user_id: user.id, job_id: pendingApplyJobId, status: "self_reported" }, { onConflict: "user_id,job_id" });
        appliedIds.add(pendingApplyJobId);
        renderJobs(jobsList || []);
      }
      closeModal();
    });
    document.getElementById("apply-no").addEventListener("click", closeModal);

    function closeModal() {
      pendingApplyJobId = null;
      document.getElementById("apply-modal").style.display = "none";
    }

    function normalizeUrl(u) {
      if (!u) return "#";
      return /^https?:\/\//.test(u) ? u : `https://${u}`;
    }

    function escapeAttr(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
